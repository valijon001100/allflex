# Telegram Local Bot API — GB videolar uchun (2GB gacha)
# https://core.telegram.org/bots/api#using-a-local-bot-api-server
#
# Ishga tushirish:
#   1. .env da TELEGRAM_BOT_TOKEN ni kiriting
#   2. docker compose -f docker-compose.telegram.yml up -d
#   3. TELEGRAM_API_BASE=http://127.0.0.1:8081 (.env yoki Render ichki URL)

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "1"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - ./media:/media:ro

volumes:
  telegram-bot-api-data:
