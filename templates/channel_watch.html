{% extends 'base.html' %}
{% load static i18n %}

{% block content %}
<div id="main" class="container channel-page">
    <h1 class="channel-page-title">{{ channel.name }}</h1>
    {% if channel.quality %}
    <span class="channel-quality-label">{{ channel.quality }}</span>
    {% endif %}

    <div id="watch_block" class="channel-player-wrap">
        <div id="channelplayer"></div>
        <p id="channelPlayerError" class="channel-player-error" style="display:none"></p>
        <span id="channelPlayerErrorMsg" class="visually-hidden">{% trans "Efir vaqtincha ishlamayapti. Boshqa kanalni sinab ko'ring." %}</span>
    </div>

    <a href="{% url 'movie:channel_list' %}?country={{ channel.country_code }}" class="channel-back-link">← {% trans 'Barcha telekanallar' %}</a>
</div>

<script src="{% static 'static/player/378/hls.js' %}"></script>
<script src="{% static 'static/js/video-player.js' %}?v=11"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    var streamUrl = '{{ channel.get_player_stream_url|escapejs }}';
    var errEl = document.getElementById('channelPlayerError');
    KinoPlayer.init('channelplayer', {'720': streamUrl}, { iptv: true });
    setTimeout(function () {
        var video = document.querySelector('#channelplayer video');
        if (video && video.readyState < 2 && !video.currentTime) {
            errEl.textContent = document.getElementById('channelPlayerErrorMsg').textContent;
            errEl.style.display = 'block';
        }
    }, 12000);
});
</script>

<style>
.channel-page .channel-page-title {
    color: #2b2f3a !important;
    font-weight: 700;
}
.channel-page .channel-quality-label {
    display: inline-block;
    margin-bottom: 16px;
    padding: 4px 10px;
    border-radius: 6px;
    background: #eceff4;
    color: #4a5568 !important;
    font-size: 13px;
}
.channel-page .channel-back-link {
    display: inline-block;
    margin-top: 20px;
    color: #8b1f35 !important;
    font-weight: 600;
}
.channel-page .channel-back-link:hover {
    color: #5c1828 !important;
}
.channel-player-wrap {
    margin-top: 16px;
    background: #111;
    border-radius: 8px;
    overflow: hidden;
    min-height: 400px;
}
.channel-player-error {
    margin: 0;
    padding: 12px 16px;
    background: #fff3cd;
    color: #7a5b00 !important;
    font-size: 14px;
}
.visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}
#channelplayer .player-quality-label,
#channelplayer .player-quality-status,
#channelplayer .player-seek-time {
    color: #e8edf5 !important;
}
#channelplayer .player-quality-select {
    color: #1f2937 !important;
    background: #fff;
}
#channelplayer .player-seek-btn {
    color: #f3f4f6 !important;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
}
</style>
{% endblock %}
