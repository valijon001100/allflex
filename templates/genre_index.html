{% extends 'base.html' %}
{% load i18n movie_tags %}

{% block content %}
<style>
.genre-index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:24px 0 40px}
.genre-index-card{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#f8fafc;text-decoration:none;font-weight:600}
.genre-index-card:hover{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:#fff}
.genre-index-arrow{color:#818cf8}
</style>
<div id="main" class="container-modern page-main">
    <div class="catalog-toolbar">
        <h1 class="catalog-title">{{ page_title }}</h1>
    </div>
    <div class="genre-index-grid">
        {% for gen in genres %}
        <a href="{% url 'movie:genre_list' gen.slug %}" class="genre-index-card">
            <span class="genre-index-name">{{ gen|genre_name:current_language }}</span>
            <span class="genre-index-arrow">→</span>
        </a>
        {% empty %}
        <p class="page-empty">{% trans "Janrlar yo'q." %}</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
