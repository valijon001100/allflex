{% extends 'base.html' %}
{% load i18n movie_tags %}

{% block content %}
<style>
.genre-index-list{background:#232736;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin:24px 0 40px;max-width:320px}
.genre-index-list a{display:block;padding:11px 22px;color:#f1f5f9;text-decoration:none;font-size:.9375rem;border-bottom:1px solid rgba(255,255,255,.05)}
.genre-index-list a:last-child{border-bottom:none}
.genre-index-list a:hover{background:rgba(255,255,255,.08);color:#fff}
</style>
<div id="main" class="container-modern page-main">
    <div class="catalog-toolbar">
        <h1 class="catalog-title">{{ page_title }}</h1>
    </div>
    <div class="genre-index-list">
        {% for gen in genres %}
        <a href="{% url 'movie:genre_list' gen.slug %}">{{ gen|genre_name:current_language }}</a>
        {% empty %}
        <p class="page-empty" style="padding:16px 22px;margin:0">{% trans "Janrlar yo'q." %}</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
