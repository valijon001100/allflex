<style>
.glass-auth-wrap {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 60px;
    background: transparent;
    margin: 0 -15px;
}
.glass-card {
    width: 100%;
    max-width: 420px;
    padding: 42px 36px 36px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
}
.glass-auth-logo {
    display: block;
    height: 56px;
    width: auto;
    max-width: 220px;
    margin: 0 auto 24px;
    object-fit: contain;
}
.glass-card h2 {
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 36px;
    color: #fff;
    letter-spacing: .5px;
}
.glass-field {
    position: relative;
    margin-bottom: 28px;
}
.glass-field-icon {
    position: absolute;
    left: 0;
    top: 2px;
    width: 20px;
    text-align: center;
    opacity: .85;
    font-size: 15px;
    pointer-events: none;
}
.glass-input {
    width: 100% !important;
    background: transparent !important;
    border: none !important;
    border-bottom: 1px solid rgba(255,255,255,.7) !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    color: #fff !important;
    padding: 8px 36px 10px 28px !important;
    font-size: 15px !important;
    height: auto !important;
}
.glass-input::placeholder { color: rgba(255,255,255,.75) !important; }
.glass-input:focus {
    outline: none !important;
    border-bottom-color: #fff !important;
    box-shadow: none !important;
}
.glass-toggle-pwd {
    position: absolute;
    right: 0;
    top: 4px;
    background: none;
    border: none;
    color: rgba(255,255,255,.8);
    cursor: pointer;
    font-size: 16px;
    padding: 0;
}
.glass-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    font-size: 13px;
}
.glass-remember {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: rgba(255,255,255,.9);
    margin: 0;
    font-weight: 400;
}
.glass-remember input {
    width: 16px;
    height: 16px;
    accent-color: #fff;
    cursor: pointer;
}
.glass-forgot {
    color: rgba(255,255,255,.9);
    text-decoration: none;
    font-size: 13px;
}
.glass-forgot:hover { color: #fff; text-decoration: underline; }
.glass-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 999px;
    background: #fff;
    color: #1a1a1a;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    margin-top: 4px;
}
.glass-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,0,0,.2);
}
.glass-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 14px;
    color: rgba(255,255,255,.85);
}
.glass-footer a {
    color: #fff;
    font-weight: 700;
    text-decoration: none;
}
.glass-footer a:hover { text-decoration: underline; }
.glass-errors {
    background: rgba(200, 50, 50, .25);
    border: 1px solid rgba(255,100,100,.5);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #ffe0e0;
}
.glass-errors ul { margin: 0; padding-left: 18px; }
.glass-field-error { color: #ffc9c9; font-size: 12px; margin-top: 6px; }
.glass-social {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,.2);
}
.glass-social-title {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,.7);
    margin-bottom: 14px;
}
.glass-social-btns { display: flex; gap: 10px; }
.glass-social-btns a {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    transition: background .2s;
}
.glass-social-btns a:hover { background: rgba(255,255,255,.25); color: #fff; }
@media (max-width: 480px) {
    .glass-card { padding: 32px 24px 28px; max-width: 100%; }
    .glass-card h2 { font-size: 26px; margin-bottom: 28px; }
}
</style>
<script>
function togglePassword(btn) {
    const input = btn.parentElement.querySelector('input');
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '👁';
    } else {
        input.type = 'password';
        btn.textContent = '👁‍🗨';
    }
}
</script>
