{% extends 'admin_panel/base.html' %}
{% load i18n %}
{% block title %}{% trans 'Удаление эфира' %}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{% trans 'Удаление эфира' %}</h1>
</div>
<div class="panel-card" style="max-width:500px">
    <p>{% trans 'Вы уверены, что хотите удалить' %} <strong>{{ stream.title }}</strong>?</p>
    <form method="post" style="margin-top:20px;display:flex;gap:12px">
        {% csrf_token %}
        <button type="submit" class="btn-admin btn-danger">{% trans 'Да, удалить' %}</button>
        <a href="{% url 'movie:admin_live_list' %}" class="btn-outline">{% trans 'Отмена' %}</a>
    </form>
</div>
{% endblock %}
